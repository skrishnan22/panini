name: Panini
options:
  xcodeVersion: "15.0"
  postGenCommand: bash scripts/downgrade_project_format.sh
  deploymentTarget:
    macOS: "14.0"
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: 2.31.3
schemes:
  Panini:
    build:
      targets:
        Panini: all
        PaniniTests: [test]
    test:
      targets:
        - PaniniTests
targets:
  Panini:
    type: application
    platform: macOS
    sources:
      - Panini
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panini.macos
        PRODUCT_MODULE_NAME: GrammarAI
        SWIFT_VERSION: 5.10
    info:
      path: Panini/Resources/Info.plist
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
  PaniniTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - PaniniTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Panini
